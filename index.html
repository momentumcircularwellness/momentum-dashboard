<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum — Performance Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bl:#7BA1C5;--db:#4A7BA5;--ac:#2C6E91;--bg:#F5F3EF;--cd:#FFF;--rs:#D96B5A;--gs:#5AA87D;--or:#D4A574;--mt:#888;--bd:#e8e6e2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:#333;padding:16px 20px;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.pbtn{display:flex;gap:4px;flex-wrap:wrap}
.pb{padding:5px 13px;border-radius:16px;font-size:11px;font-weight:500;background:var(--cd);color:#666;border:1px solid #ddd;cursor:pointer;font-family:inherit;transition:all .2s}
.pb.on{background:var(--bl);color:#fff;border-color:var(--bl);font-weight:700}
.nav{display:flex;border-bottom:2px solid var(--bd);margin-bottom:14px;flex-wrap:wrap}
.nb{padding:6px 14px;font-size:11.5px;font-weight:400;color:var(--mt);background:0;border:0;border-bottom:3px solid transparent;cursor:pointer;margin-bottom:-2px;font-family:inherit}
.nb.on{font-weight:700;color:var(--ac);border-bottom-color:var(--bl)}
.kr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.k{background:var(--cd);border-radius:10px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06);flex:1;min-width:130px}
.k.s{padding:9px 11px;min-width:100px}
.kl{font-size:9.5px;color:var(--mt);margin-bottom:3px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.k.s .kl{font-size:8.5px}
.kv{font-size:22px;font-weight:700;color:var(--ac)}
.k.s .kv{font-size:16px}
.ks{font-size:9px;color:#aaa;margin-top:1px}
.cd{background:var(--cd);border-radius:10px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:14px}
.ct{font-size:12px;font-weight:600;color:var(--db);margin-bottom:8px}
.fr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.fr>.cd{flex:1;min-width:200px}
.sc{display:flex;align-items:center;gap:8px;margin:24px 0 12px}
.sb{width:4px;height:20px;background:var(--bl);border-radius:2px}
.st{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:10.5px}
th{text-align:right;padding:5px 7px;border-bottom:2px solid var(--bl);color:var(--db);font-weight:600;white-space:nowrap;font-size:9.5px}
th:first-child{text-align:left}
td{text-align:right;padding:4px 7px;border-bottom:1px solid #eee;white-space:nowrap;font-size:10px}
td:first-child{text-align:left}
tr:nth-child(even){background:#FAFAF8}
.pos{color:var(--gs);font-weight:600}.neg{color:var(--rs);font-weight:600}.mid{color:#555;font-weight:600}
.ic{background:var(--cd);border-radius:10px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);flex:1;min-width:185px}
.in{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:6px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:10px}
.ig .lb{font-size:8.5px;color:#999}
.tr{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tb{padding:4px 11px;border-radius:14px;font-size:10px;border:1px solid #ddd;background:var(--cd);color:#666;cursor:pointer;font-family:inherit;font-weight:600}
.tb.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.nt{margin-top:22px;padding:8px 12px;background:rgba(123,161,197,.08);border-radius:8px;font-size:9px;color:#999}
canvas{max-width:100%}
</style>
</head>

const aD=aA(ms),cD=aC(ms);
h+=`<div class="sc"><div class="sb"></div><div class="st">📊 Attività — ${pl}</div></div>`;
h+=`<div class="fr"><div class="cd" style="min-width:220px"><div class="ct">Prenotazioni totali per Attività</div><div style="height:200px"><canvas id="ap"></canvas></div></div>`;
h+=`<div class="cd" style="flex:2;min-width:330px">${tbl(["Attività","Prenot.","Lez.","Avg Cl.","Ric. Lordo*","Ric. Netto","Comp.","Marg.€","M. Netto"],aD.map(a=>[a.a,fm(a.p),fm(a.l),fD(a.mc),fE(a.r),fE(Math.round(ni(a.r))),fE(a.c),fE(Math.round(a.d)),a.mn]),true)}</div></div>`;
setTimeout(()=>{const ctx=document.getElementById("ap");if(!ctx)return;CH.ap=new Chart(ctx,{type:"doughnut",data:{labels:aD.map(a=>a.a),datasets:[{data:aD.map(a=>a.p),backgroundColor:PC,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"40%",plugins:{legend:{position:"bottom",labels:{font:{family:"Montserrat",size:8}}}}}});},50);
// RvS for activities
h+=`<div class="cd"><div class="ct">Ricavo* vs Compensi per Attività — ${pl}</div><div style="height:180px"><canvas id="arvs"></canvas></div></div>`;
setTimeout(()=>{const ctx=document.getElementById("arvs");if(!ctx)return;CH.arvs=new Chart(ctx,{type:"bar",data:{labels:aD.map(a=>a.a.length>12?a.a.substring(0,12)+"…":a.a),datasets:[{label:"Ricavo*",data:aD.map(a=>Math.round(a.r)),backgroundColor:BL,borderRadius:4},{label:"Compensi",data:aD.map(a=>Math.round(a.c)),backgroundColor:RS,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:"Montserrat",size:10}}},tooltip:{callbacks:{label:c=>" "+c.dataset.label+": €"+c.raw.toLocaleString("it-IT")}}},scales:{x:{ticks:{font:{family:"Montserrat",size:9}}},y:{ticks:{font:{family:"Montserrat",size:9},callback:v=>"€"+v}}}}});},50);

h+=`<div class="sc"><div class="sb"></div><div class="st">📋 Dettaglio per Classe — ${pl}</div></div>`;
h+=`<div class="tr"><button class="tb${S.cv==="chart"?" on":""}" onclick="S.cv='chart';render()">📊 Grafico</button><button class="tb${S.cv==="table"?" on":""}" onclick="S.cv='table';render()">📋 Dettaglio</button></div>`;
if(S.cv==="chart"){
const sorted=[...cD].sort((a,b)=>a.d-b.d);
h+=`<div class="cd"><div class="ct">Margine netto (€) per classe — dal peggiore al migliore</div><div style="font-size:9px;color:#999;margin-bottom:6px"><span style="color:${RS}">■</span> In perdita · <span style="color:${OR}">■</span> Basso margine · <span style="color:${GS}">■</span> Profittevole</div><div style="height:${Math.max(280,sorted.length*22)}px"><canvas id="cc"></canvas></div></div>`;
setTimeout(()=>{const ctx=document.getElementById("cc");if(!ctx)return;CH.cc=new Chart(ctx,{type:"bar",data:{labels:sorted.map(c=>DY[c.g]+" "+c.o+":00 "+c.a),datasets:[{label:"Margine €",data:sorted.map(c=>Math.round(c.d)),backgroundColor:sorted.map(c=>c.d<0?RS:c.d<20?OR:GS),borderRadius:3}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ct2=>{const i=ct2.dataIndex;return"€"+ct2.raw+" ("+fP(sorted[i].mn)+")";}}}},scales:{x:{ticks:{font:{family:"Montserrat",size:9},callback:v=>"€"+v}},y:{ticks:{font:{family:"Montserrat",size:8.5}}}}}});},50);
}else{
const sorted=[...cD].sort((a,b)=>b.mn-a.mn);
h+=`<div class="cd" style="max-height:420px;overflow-y:auto">${tbl(["Giorno","Attività","Ora","Istr.","Pren.","Lez.","Avg","Ric. Lordo*","Ric. Netto","Comp.","Marg.€","M. Netto"],sorted.map(c=>[DY[c.g],c.a,c.o+":00",c.i||"",fm(c.p),fm(c.l),fD(c.mc),fE(c.r),fE(Math.round(ni(c.r))),fE(c.c),fE(Math.round(c.d)),c.mn]),true)}</div>`;}}

if(S.s==="personal"){
h+=`<div class="sc"><div class="sb"></div><div class="st">🏋️ Personal & MomenTEAM — ${pl}</div></div>`;
const pby=ms.flatMap(m=>D.pers_by[m]||[]).reduce((acc,p)=>{const ex=acc.find(a=>a.i===p.i);if(ex){ex.p+=p.p;ex.l+=p.l;}else acc.push({...p});return acc;},[]);pby.forEach(p=>{if(p.l)p.mc=+(p.p/p.l).toFixed(2);});
h+=`<div class="fr">${pby.map(p=>`<div class="ic"><div class="in">${p.i}</div><div class="ig"><div><span class="lb">Lezioni</span><br><b>${p.l}</b></div><div><span class="lb">Prenotazioni</span><br><b>${p.p}</b></div><div style="grid-column:1/3"><span class="lb">Media clienti</span><br><b>${fD(p.mc)}</b></div></div></div>`).join("")}</div>`;
const iP=aI(ms,"pers");
if(iP){h+=`<div class="cd"><div class="ct">Dettaglio Economico</div>${tbl(["Istruttore","Lez.","Pren.","Ric. Lordo*","Ric. Netto","Stip.","M. Netto"],iP.map(i=>[i.n,fm(i.l),fm(i.p),fE(i.r),fE(Math.round(ni(i.r))),fE(i.s),i.mn]),true)}</div>`;
h+=`<div class="cd"><div class="ct">Ricavo* vs Compensi — Personal & MomenTEAM — ${pl}</div><div style="height:180px"><canvas id="prvs"></canvas></div></div>`;
setTimeout(()=>{const ctx=document.getElementById("prvs");if(!ctx)return;CH.prvs=new Chart(ctx,{type:"bar",data:{labels:iP.map(i=>i.n.split(" ")[0]),datasets:[{label:"Ricavo*",data:iP.map(i=>Math.round(i.r)),backgroundColor:BL,borderRadius:4},{label:"Compensi",data:iP.map(i=>Math.round(i.s)),backgroundColor:RS,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:"Montserrat",size:10}}},tooltip:{callbacks:{label:c=>" "+c.dataset.label+": €"+c.raw.toLocaleString("it-IT")}}},scales:{x:{ticks:{font:{family:"Montserrat",size:10}}},y:{ticks:{font:{family:"Montserrat",size:9},callback:v=>"€"+v}}}}});},50);}}

el.innerHTML=h;}
render();
</script>
</body>
</html>
