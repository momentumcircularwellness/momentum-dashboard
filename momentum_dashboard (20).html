<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum — Performance Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bl:#7BA1C5;--db:#4A7BA5;--ac:#2C6E91;--bg:#F5F3EF;--cd:#FFF;--rs:#D96B5A;--gs:#5AA87D;--or:#D4A574;--mt:#888;--bd:#e8e6e2}
.print-fab{position:fixed;top:8px;right:20px;z-index:9999;background:var(--ac);color:#fff;border:none;border-radius:16px;padding:6px 12px 6px 9px;font-family:'Montserrat',sans-serif;font-size:10.5px;font-weight:700;display:flex;align-items:center;gap:5px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18);transition:background .2s,transform .15s;opacity:.85}
.print-fab:hover{background:var(--db);transform:translateY(-1px);opacity:1}
.print-fab svg{width:12px;height:12px;flex-shrink:0}
@media print{
  .print-fab,.pbtn,.nav{display:none!important}
  body{padding:0;background:#fff}
  .cd,.k{box-shadow:none!important;border:1px solid #ddd}
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:#333;padding:34px 20px 16px;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.pbtn{display:flex;gap:4px;flex-wrap:wrap}
.pb{padding:5px 13px;border-radius:16px;font-size:11px;font-weight:500;background:var(--cd);color:#666;border:1px solid #ddd;cursor:pointer;font-family:inherit;transition:all .2s}
.pb.on{background:var(--bl);color:#fff;border-color:var(--bl);font-weight:700}
.nav{display:flex;border-bottom:2px solid var(--bd);margin-bottom:14px;flex-wrap:wrap}
.nb{padding:6px 14px;font-size:11.5px;font-weight:400;color:var(--mt);background:0;border:0;border-bottom:3px solid transparent;cursor:pointer;margin-bottom:-2px;font-family:inherit}
.nb.on{font-weight:700;color:var(--ac);border-bottom-color:var(--bl)}
.kr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.k{background:var(--cd);border-radius:10px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06);flex:1;min-width:130px}
.k.s{padding:9px 11px;min-width:100px}
.kl{font-size:9.5px;color:var(--mt);margin-bottom:3px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.k.s .kl{font-size:8.5px}
.kv{font-size:22px;font-weight:700;color:var(--ac)}
.k.s .kv{font-size:16px}
.ks{font-size:9px;color:#aaa;margin-top:1px}
.cd{background:var(--cd);border-radius:10px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:14px}
.ct{font-size:12px;font-weight:600;color:var(--db);margin-bottom:8px}
.fr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.fr>.cd{flex:1;min-width:200px}
.sc{display:flex;align-items:center;gap:8px;margin:24px 0 12px}
.sb{width:4px;height:20px;background:var(--bl);border-radius:2px}
.st{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:10.5px}
th{text-align:right;padding:5px 7px;border-bottom:2px solid var(--bl);color:var(--db);font-weight:600;white-space:nowrap;font-size:9.5px}
th:first-child{text-align:left}
td{text-align:right;padding:4px 7px;border-bottom:1px solid #eee;white-space:nowrap;font-size:10px}
td:first-child{text-align:left}
tr:nth-child(even){background:#FAFAF8}
.pos{color:var(--gs);font-weight:600}.neg{color:var(--rs);font-weight:600}.mid{color:#555;font-weight:600}
.ic{background:var(--cd);border-radius:10px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);flex:1;min-width:185px}
.in{font-size:12px;font-weight:700;color:var(--ac);margin-bottom:6px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:10px}
.ig .lb{font-size:8.5px;color:#999}
.tr{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tb{padding:4px 11px;border-radius:14px;font-size:10px;border:1px solid #ddd;background:var(--cd);color:#666;cursor:pointer;font-family:inherit;font-weight:600}
.tb.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.nt{margin-top:22px;padding:8px 12px;background:rgba(123,161,197,.08);border-radius:8px;font-size:9px;color:#999}
canvas{max-width:100%}
</style>
</head>

function renderSnapshot(data, label, wfId, spId, hrData, ogData, showOG, title){
  const d=data;if(!d)return"";
  let h2="";
  const isSM=ms.length===1;
  const prevMs=isSM?ms.map(m=>m-1).filter(m=>m>=1):[];
  h2+=`<div class="sc"><div class="sb"></div><div class="st">${title} — ${label}</div></div>`;
  h2+=`<div class="kr">`;
  // delta margine vs prev month
  let deltaStr="";
  if(prevMs.length){
    let prevD=null;
    if(data===ov){const p=aO(prevMs);if(p)prevD=p.mn;}
    else if(data===con){const p=aCon(prevMs);if(p)prevD=p.mn;}
    else if(data._type==="classi"){const p=aO(prevMs);if(p)prevD=p.mn;}
    else if(data._type==="pers"){const p=aI(prevMs,"pers").reduce((acc,i)=>{acc.nf+=i.nf;acc.s+=i.s;return acc;},{nf:0,s:0});prevD=prevD===null&&prevD!==0?null:prevD;}
    if(prevD!=null){const delta=d.mn-prevD;deltaStr=`<div style="font-size:10px;margin-top:3px;color:${delta>=0?"var(--gs)":"var(--rs)"};font-weight:600">${delta>=0?"▲":"▼"} ${Math.abs(delta).toFixed(1)}pp vs mese prec.</div>`;}
  }
  h2+=kpi("Prenotazioni",fm(d.pren),fm(d.lez)+" lezioni");
  h2+=kpi("Ricavo Lordo",fE(d.rl),"Ric. Netto "+fE(Math.round(d.nf)));
  h2+=kpi("Costo Collaboratori",fE(d.st));
  h2+=`<div class="k"><div class="kl">Margine di Contr.</div><div class="kv">${fP(d.mn)}</div>${deltaStr}</div>`;

h+=`<div class="cd"><div class="ct">Top 15 Clienti per Prenotazioni — Gen-Giu 2026</div>`;

h+=`<table><thead><tr><th style="text-align:left">#</th><th style="text-align:left">Cliente</th><th>Prenotazioni</th><th>Spesa Totale</th><th>Freq./mese</th><th style="text-align:left">Attivita</th></tr></thead><tbody>`;
topCl.forEach((c,i)=>{

h+=`</tbody></table></div>`;

h+=`<div class="cd"><div class="ct">Prenotazioni per Cliente (Top 15)</div><div style="height:${Math.max(250,topCl.length*24)}px"><canvas id="clBar"></canvas></div></div>`;
setTimeout(()=>{if(_rGen!==_myGen)return;const ctx=document.getElementById("clBar");if(!ctx)return;
CH.clBar=new Chart(ctx,{type:"bar",data:{labels:topCl.map(c=>c.n.length>20?c.n.substring(0,20)+"...":c.n),datasets:[{label:"Prenotazioni",data:topCl.map(c=>c.p),backgroundColor:BL,borderRadius:3}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>" "+c.raw+" prenotazioni"}}},scales:{x:{beginAtZero:true,ticks:{font:{family:"Montserrat",size:9}}},y:{ticks:{font:{family:"Montserrat",size:9}}}}}});},50);

}
if(S.clv==="crediti"){
// ===== CREDITI ATTIVI VERSO CLIENTI =====
h+=`<div class="sc"><div class="sb"></div><div class="st">Crediti Verso Clienti — Abbonamenti Attivi</div></div>`;
h+=`<div style="font-size:10px;color:#aaa;margin-bottom:10px;line-height:1.5">Somma dei crediti (Restanti + Future) di tutti gli abbonamenti con stato Attivo: lezioni gia pagate dai clienti e non ancora fruite, che il centro deve ancora erogare.</div>`;
const ac=D.credits.active_credits;
h+=`<div class="kr">`;
h+=`<div class="k"><div class="kl">Crediti Totali</div><div class="kv">${fm(ac.tot_credits)}</div><div class="ks">${fm(ac.tot_restanti)} restanti + ${fm(ac.tot_future)} future · ${fm(ac.tot_cnt)} abbonamenti</div></div>`;
h+=`<div class="k"><div class="kl">Crediti Pagati</div><div class="kv" style="color:var(--ac)">${fm(ac.paid_credits)}</div><div class="ks">${fm(ac.paid_cnt)} abbonamenti a pagamento</div></div>`;
h+=`<div class="k"><div class="kl">Valore Crediti Pagati</div><div class="kv" style="color:#D96B5A">${fE(ac.paid_value)}</div><div class="ks">lezioni da erogare (valore esatto per lezione/ingresso)</div></div>`;
h+=`<div class="k"><div class="kl">Lezioni Omaggio Attive</div><div class="kv" style="color:#aaa">${fm(ac.omaggio_cnt)}</div><div class="ks">prove gratuite non ancora usate</div></div>`;
h+=`</div>`;
// Detail table of paid credits
h+=`<div class="cd"><div class="ct">Dettaglio Crediti Pagati per Cliente</div><div style="overflow-x:auto">${tbl(["Cliente","Abbonamento","Restanti","Future","Valore"],ac.detail.map(d=>[d.n,d.a,fm(d.res),fm(d.fut),fE(d.cv)]),false)}</div></div>`;
// CREDITI RESIDUI
h+=`<div class="sc"><div class="sb"></div><div class="st">Crediti Residui — Stato Abbonamenti</div></div>`;
h+=`<div style="font-size:10px;color:#aaa;margin-bottom:10px;line-height:1.5">Analisi basata sull'ultimo abbonamento di ogni cliente (escluse Lezioni Omaggio non esaurite). I valori di Fatturato e Ric. Lordo rappresentano il valore potenziale del rinnovo.</div>`;

const cs=D.credits.summary;
const totActive=cs.in_prova.cnt+cs.recentemente_esaurito.cnt+cs.in_esaurimento.cnt+cs.in_corso.cnt;
h+=`<div class="kr">`;
h+=`<div class="k"><div class="kl">In Prova</div><div class="kv" style="color:var(--bl)">${cs.in_prova.cnt}</div></div>`;
h+=`<div class="k"><div class="kl">Rec. Esaurito</div><div class="kv" style="color:var(--rs)">${cs.recentemente_esaurito.cnt}</div><div class="ks">RL pot. ${fE(cs.recentemente_esaurito.rl)}</div></div>`;
h+=`<div class="k"><div class="kl">In Esaurimento</div><div class="kv" style="color:var(--or)">${cs.in_esaurimento.cnt}</div><div class="ks">RL pot. ${fE(cs.in_esaurimento.rl)}</div></div>`;
h+=`<div class="k"><div class="kl">In Corso</div><div class="kv" style="color:var(--gs)">${cs.in_corso.cnt}</div><div class="ks">RL pot. ${fE(cs.in_corso.rl)}</div></div>`;
h+=`<div class="k"><div class="kl">Non Rinnovo</div><div class="kv" style="color:var(--mt)">${cs.non_rinnovo.cnt}</div><div class="ks">RL pot. ${fE(cs.non_rinnovo.rl)}</div></div>`;
h+=`<div class="k"><div class="kl">Pot. Rinnovo</div><div class="kv" style="color:#8B5CF6">${cs.potenziale_rinnovo.cnt}</div><div class="ks">RL pot. ${fE(cs.potenziale_rinnovo.rl)}</div></div>`;
h+=`</div>`;

// Doughnut chart of tag distribution
h+=`<div class="fr">`;
h+=`<div class="cd" style="min-width:220px"><div class="ct">Distribuzione Clienti per Stato</div><div style="height:200px"><canvas id="crPie"></canvas></div></div>`;
setTimeout(()=>{if(_rGen!==_myGen)return;const ctx=document.getElementById("crPie");if(!ctx)return;
CH.crPie=new Chart(ctx,{type:"doughnut",data:{labels:["In Prova","Rec. Esaurito","In Esaurimento","In Corso","Non Rinnovo"],datasets:[{data:[cs.in_prova.cnt,cs.recentemente_esaurito.cnt,cs.in_esaurimento.cnt,cs.in_corso.cnt,cs.non_rinnovo.cnt],backgroundColor:[BL,RS,OR,GS,"#ccc"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"45%",plugins:{legend:{position:"bottom",labels:{font:{family:"Montserrat",size:9}}}}}});},50);

// Pipeline value chart
h+=`<div class="cd" style="min-width:300px"><div class="ct">Valore Potenziale Rinnovi (Ric. Lordo)</div><div style="height:200px"><canvas id="crVal"></canvas></div></div>`;
setTimeout(()=>{if(_rGen!==_myGen)return;const ctx=document.getElementById("crVal");if(!ctx)return;
CH.crVal=new Chart(ctx,{type:"bar",data:{labels:["Rec. Esaurito","In Esaurimento","In Corso"],datasets:[{label:"Ric. Lordo pot.",data:[cs.recentemente_esaurito.rl,cs.in_esaurimento.rl,cs.in_corso.rl],backgroundColor:[RS,OR,GS],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"€"+c.raw.toLocaleString("it-IT")}}},scales:{x:{ticks:{font:{family:"Montserrat",size:10}}},y:{beginAtZero:true,ticks:{font:{family:"Montserrat",size:9},callback:v=>"€"+v}}}}});},50);
h+=`</div>`;

// Detail tables per tag
function crTbl(title,items,color,showLeft){
if(!items.length)return"";
let o=`<div class="cd"><div class="ct" style="color:${color}">${title} (${items.length} clienti)</div>`;
const hdrs=["Cliente","Abbonamento","Fatt. pot.","RL pot."];
if(showLeft)hdrs.push("Crediti rim.");
o+=`<table><thead><tr>${hdrs.map(h=>"<th"+(h==="Cliente"||h==="Abbonamento"?' style="text-align:left"':"")+">"+h+"</th>").join("")}</tr></thead><tbody>`;
items.forEach(i=>{
o+=`<tr><td style="text-align:left"><b>${i.n}</b></td><td style="text-align:left;font-size:9px">${i.a}</td><td>${fE(i.f)}</td><td>${fE(i.r)}</td>`;
if(showLeft)o+=`<td>${i.l||"0"}</td>`;
o+=`</tr>`;});
return o+`</tbody></table></div>`;}

h+=crTbl("Recentemente Esaurito — Rinnovo probabile",D.credits.recentemente_esaurito,RS,false);
h+=crTbl("In Esaurimento — Rinnovo imminente",D.credits.in_esaurimento,OR,true);
h+=crTbl("In Corso",D.credits.in_corso,GS,true);
if(D.credits.in_prova.length)h+=crTbl("In Prova",D.credits.in_prova,BL,false);
if(D.credits.potenziale_rinnovo&&D.credits.potenziale_rinnovo.length)h+=crTbl("Potenziale Rinnovo — Scaduto da meno di 20gg",D.credits.potenziale_rinnovo,"#8B5CF6",false);
}
}


// ===== YoY =====
if(S.view==="yoy"){
const ML=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

// ── Istruttori YoY: per-instructor with multi-select filter ──
if(S.s==="instructors"){
  // Instructor filter state stored in S.yoyInstr (array of names)
  if(!S.yoyInstr)S.yoyInstr=["Alessia Baldini","Graziano Araldi","Beatrice Cuoghi"];
  const allInstr=["Alessia Baldini","Graziano Araldi","Beatrice Cuoghi"];
  const instrColors={"Alessia Baldini":"#7BA1C5","Graziano Araldi":"#D96B5A","Beatrice Cuoghi":"#5AA87D"};
  const instrColors25={"Alessia Baldini":"#B8D3E8","Graziano Araldi":"#EDAA99","Beatrice Cuoghi":"#A5D4B8"};

  // Filter pill buttons
  h+=`<div class="sc"><div class="sb"></div><div class="st">Confronto 2025 vs 2026 — per Istruttore</div></div>`;
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">`;
  h+=`<span style="font-size:11px;color:var(--color-text-secondary,#888);margin-right:4px">Filtra istruttori:</span>`;
  allInstr.forEach(name=>{
    const on=S.yoyInstr.includes(name);
    const col=instrColors[name];
    h+=`<button onclick="
      const idx=S.yoyInstr.indexOf('${name}');
      if(idx>=0&&S.yoyInstr.length>1)S.yoyInstr.splice(idx,1);
      else if(idx<0)S.yoyInstr.push('${name}');
      render();
    " style="padding:5px 14px;border-radius:20px;font-size:11px;font-weight:${on?700:500};background:${on?col:'var(--cd,#fff)'};color:${on?'#fff':'#666'};border:1.5px solid ${col};cursor:pointer;font-family:inherit;transition:all .15s">${name.split(' ')[0]}</button>`;
  });
  h+=`</div>`;

  // Chart builder for instructor YoY
  function yoyInstrLine(id,title,getVal25,getVal26,fmtV,yFmt,only2026=false){
    h+=`<div class="cd"><div class="ct">${title}</div><div style="height:220px"><canvas id="${id}"></canvas></div></div>`;
    setTimeout(()=>{
      if(_rGen!==_myGen)return;const ctx=document.getElementById(id);if(!ctx)return;
      const datasets=[];
      S.yoyInstr.forEach(name=>{
        // 2025 data from D25instr
        const d25vals=ML.map((_,i)=>{
          const m=i+1;
          const rec=D25instr.find(x=>x.m===m&&x.n===name);
          return rec?getVal25(rec):null;
        });
        // 2026 data
        const d26vals=ML.map((_,i)=>{
          const m=i+1;
          const instrData=D.instr[S.iv]?.[m];
          if(!instrData)return null;
          const rec=instrData.find(x=>x.n===name);
          return rec?getVal26(rec,m):null;
        });
        if(!only2026)datasets.push({label:name.split(' ')[0]+' 2025',data:d25vals,borderColor:instrColors25[name],borderWidth:2,borderDash:[4,3],tension:.3,pointRadius:3,pointBackgroundColor:instrColors25[name]});
        datasets.push({label:name.split(' ')[0]+' 2026',data:d26vals,borderColor:instrColors[name],borderWidth:2.5,tension:.3,pointRadius:4,pointBackgroundColor:instrColors[name]});
      });
      CH[id]=new Chart(ctx,{type:"line",data:{labels:ML,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{font:{family:"Montserrat",size:9},boxWidth:14}},tooltip:{callbacks:{label:c=>c.raw!=null?" "+c.dataset.label+": "+fmtV(c.raw):null}}},scales:{x:{ticks:{font:{family:"Montserrat",size:9}}},y:{beginAtZero:true,ticks:{font:{family:"Montserrat",size:9},callback:yFmt||function(v){return v}}}}}});
    },50);
  }

  // Show sub-tab selector for all/classi/pers so filter applies to chosen view
  let sub="";[{k:"all",l:"Complessiva"},{k:"classi",l:"Solo Classi"},{k:"pers",l:"Solo Personal/MomenTEAM"}].forEach(t=>{sub+=`<button class="nb${S.iv===t.k?" on":""}" onclick="S.iv='${t.k}';render()">${t.l}</button>`;});
  h+=`<div class="nav">${sub}</div>`;

  // Ricavo Lordo: 2026 only (2025 per-instructor data not available disaggregated)
  yoyInstrLine("yiRl","Ricavo Lordo (Netto ex-comm.)",
    r=>null,
    r=>Math.round(r.nf||r.r/1.03),v=>fE(v),v=>"€"+v,true);
  // Costo Collaboratori: both years (2025 = real data from resoconti)
  yoyInstrLine("yiSt","Costo Collaboratori",
    r=>typeof r.s==='number'?Math.round(r.s):null,
    r=>Math.round(r.s),v=>fE(v),v=>"€"+v);
  // Margine: 2026 only (2025 estimate would be misleading)
  yoyInstrLine("yiMn","Margine di Contr. %",
    r=>null,
    r=>+r.mn,v=>fP(v),v=>v+"%",true);
  yoyInstrLine("yiNd","Margine di Contr. (€)",
    r=>null,
    r=>Math.round(r.nd),v=>fE(v),v=>"€"+v,true);
  h+=`<div style="font-size:9px;color:#aaa;margin-top:8px;padding:0 8px">Costo Collaboratori 2025: dato reale da resoconti. RL e Margine 2025 per istruttore: non disponibili disaggregati.</div>`;
  el.innerHTML=h;return;
}

// ── Other sections: consolidated YoY ──
const d26=D.consolidated;const m26=d26.map(o=>o.m);
h+=`<div class="sc"><div class="sb"></div><div class="st">Confronto 2025 vs 2026 — Consolidato (Corsi+Personal+Open Gym)</div></div>`;
function yoyLine(id,title,get25,get26,fmtV,yFmt){
h+=`<div class="cd"><div class="ct">${title}</div><div style="height:220px"><canvas id="${id}"></canvas></div></div>`;
setTimeout(()=>{if(_rGen!==_myGen)return;const ctx=document.getElementById(id);if(!ctx)return;
CH[id]=new Chart(ctx,{type:"line",data:{labels:ML,datasets:[
{label:"2025",data:ML.map((_,i)=>{const d=D25.find(x=>x.m===i+1);return d?get25(d):null;}),borderColor:"#A8C4DB",borderWidth:2,tension:.3,pointRadius:3,pointBackgroundColor:"#A8C4DB"},
{label:"2026",data:ML.map((_,i)=>{const d=d26.find(x=>x.m===i+1);return d?get26(d):null;}),borderColor:BL,borderWidth:3,tension:.3,pointRadius:5,pointBackgroundColor:BL}
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:"Montserrat",size:10}}},tooltip:{callbacks:{label:c=>c.raw!=null?" "+c.dataset.label+": "+fmtV(c.raw):null}}},scales:{x:{ticks:{font:{family:"Montserrat",size:9}}},y:{beginAtZero:true,ticks:{font:{family:"Montserrat",size:9},callback:yFmt||function(v){return v}}}}}});},50);}
yoyLine("yPren","Prenotazioni",d=>d.pren,d=>d.pren,v=>fm(v));
yoyLine("yRl","Ricavo Lordo",d=>Math.round(d.rl),d=>Math.round(d.rl),v=>fE(v),v=>"€"+v);
yoyLine("ySt","Costo Collaboratori",d=>d.st,d=>d.st,v=>fE(v),v=>"€"+v);
yoyLine("yNd","Margine di Contr. (€)",d=>Math.round(d.nd),d=>Math.round(d.nd),v=>fE(v),v=>"€"+v);
yoyLine("yMn","Margine di Contr. %",d=>+d.mn,d=>+d.mn,v=>fP(v),v=>v+"%");
el.innerHTML=h;return;}

// ===== FORECAST =====
if(S.view==="forecast"){
const ML=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const d26=D.consolidated;const m26=d26.map(o=>o.m);
h+=`<div class="sc"><div class="sb"></div><div class="st">Forecast 2026 — Basato su delta vs 2025 (Consolidato)</div></div>`;
h+=`<div style="font-size:10px;color:#aaa;margin-bottom:14px;line-height:1.5">Per ogni mese futuro si applica al dato 2025 il delta % medio dei mesi consuntivi 2026.</div>`;
function avgD(g25,g26){const ds=m26.map(m=>{const v5=g25(D25.find(x=>x.m===m));const v6=g26(d26.find(x=>x.m===m));return v5>0?(v6/v5-1):0;});return ds.reduce((s,d)=>s+d,0)/ds.length;}
const dP=avgD(d=>d.pren,d=>d.pren),dR=avgD(d=>d.rl,d=>d.rl),dS=avgD(d=>d.st,d=>d.st);
function fc(g25,delta){return Array.from({length:12},(_,i)=>{const m=i+1;const d5=D25.find(x=>x.m===m);if(!d5)return 0;const d6=d26.find(x=>x.m===m);return d6?null:Math.round(g25(d5)*(1+delta));});}
const fP2=fc(d=>d.pren,dP),fR=fc(d=>d.rl,dR),fS=fc(d=>d.st,dS);
const fNd=Array.from({length:12},(_,i)=>{const d6=d26.find(x=>x.m===i+1);if(d6)return null;return fR[i]&&fS[i]?Math.round(fR[i]/COMM-fS[i]):0;});
h+=`<div class="kr">${kpi("Delta medio Pren.",(dP>=0?"+":"")+Math.round(dP*100)+"%","vs 2025")}${kpi("Delta medio Ricavo",(dR>=0?"+":"")+Math.round(dR*100)+"%","vs 2025")}${kpi("Delta medio Costo",(dS>=0?"+":"")+Math.round(dS*100)+"%","vs 2025")}</div>`;
function fcLine(id,title,g25,g26r,fcD,fmtV,yFmt){
h+=`<div class="cd"><div class="ct">${title}</div><div style="height:220px"><canvas id="${id}"></canvas></div></div>`;
setTimeout(()=>{if(_rGen!==_myGen)return;const ctx=document.getElementById(id);if(!ctx)return;
const v25=ML.map((_,i)=>{const d=D25.find(x=>x.m===i+1);return d?g25(d):null;});
const v26a=ML.map((_,i)=>{const d=d26.find(x=>x.m===i+1);return d?g26r(d):null;});
const v26f=ML.map((_,i)=>fcD[i]);
const li=m26[m26.length-1]-1;if(v26f[li]===null&&v26a[li]!=null)v26f[li]=v26a[li];
CH[id]=new Chart(ctx,{type:"line",data:{labels:ML,datasets:[
{label:"2025",data:v25,borderColor:"#A8C4DB",borderWidth:2,tension:.3,pointRadius:3},
{label:"2026 Consuntivo",data:v26a,borderColor:BL,borderWidth:3,tension:.3,pointRadius:5,pointBackgroundColor:BL},
{label:"2026 Forecast",data:v26f,borderColor:BL,borderWidth:2,borderDash:[6,4],tension:.3,pointRadius:4,pointBackgroundColor:BL+"80"}
]},options:{responsive:true,maintainAspectRatio:false,spanGaps:false,plugins:{legend:{labels:{font:{family:"Montserrat",size:9}}},tooltip:{callbacks:{label:c=>c.raw!=null?" "+c.dataset.label+": "+fmtV(c.raw):null}}},scales:{x:{ticks:{font:{family:"Montserrat",size:9}}},y:{beginAtZero:true,ticks:{font:{family:"Montserrat",size:9},callback:yFmt||function(v){return v}}}}}});},50);}
fcLine("fP","Prenotazioni — Forecast",d=>d.pren,d=>d.pren,fP2,v=>fm(v));
fcLine("fR","Ricavo Lordo — Forecast",d=>Math.round(d.rl),d=>Math.round(d.rl),fR,v=>fE(v),v=>"€"+v);
fcLine("fS","Costo Collaboratori — Forecast",d=>d.st,d=>d.st,fS,v=>fE(v),v=>"€"+v);
fcLine("fNd","Margine di Contr. (€) — Forecast",d=>Math.round(d.nd),d=>Math.round(d.nd),fNd,v=>fE(v),v=>"€"+v);
h+=`<div class="cd"><div class="ct">Riepilogo Forecast 2026</div>`;
h+=tbl(["Mese","Prenot.","Ric. Lordo","Costo Collab.","Margine €","M. Contr."],ML.map((ml,i)=>{const m=i+1;const d6=d26.find(x=>x.m===m);
if(d6)return[ml+" (cons.)",fm(d6.pren),fE(d6.rl),fE(d6.st),fE(Math.round(d6.nd)),d6.mn];
const d5=D25.find(x=>x.m===m);if(!d5)return[ml,"—","—","—","—",0];
const fmn=fR[i]?+((fR[i]/COMM-fS[i])/(fR[i]/COMM)*100).toFixed(1):0;
return[ml+" (fc.)",fm(fP2[i]),fE(fR[i]),fE(fS[i]),fE(fNd[i]),fmn];}),true);
h+=`</div>`;el.innerHTML=h;return;}

el.innerHTML=h;}
render();

</script>
